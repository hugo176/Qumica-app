<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudio Interactivo - Coloquio N° 2</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #34495e;
            --accent: #3498db;
            --success: #27ae60;
            --warning: #f39c12;
            --danger: #e74c3c;
            --light: #ecf0f1;
            --dark: #2c3e50;
            --text: #333;
            --bg: #f4f7f6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        #sidebar {
            width: 300px;
            flex-shrink: 0; /* Prevents sidebar from squashing */
            background-color: var(--primary);
            color: white;
            padding: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
        }

        #sidebar h2 {
            margin-bottom: 20px;
            font-size: 1.2rem;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 10px;
            flex-shrink: 0;
        }

        #colloquium-container {
            flex-grow: 1;
            overflow-y: auto; /* Allows the menu to scroll if it's too long */
            padding-right: 5px;
        }

        .colloquium-group {
            margin-bottom: 10px;
        }

        .colloquium-header {
            padding: 10px;
            background-color: var(--secondary);
            cursor: pointer;
            border-radius: 4px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.3s;
        }

        .colloquium-header:hover {
            background-color: var(--accent);
        }

        .exercise-list {
            list-style: none;
            padding-left: 15px;
            display: none; /* Hidden by default */
            margin-top: 5px;
        }

        .exercise-list.expanded {
            display: block;
        }

        .exercise-item {
            padding: 8px;
            cursor: pointer;
            border-radius: 4px;
            margin-bottom: 5px;
            transition: background 0.3s;
            font-size: 0.9rem;
        }

        .exercise-item:hover {
            background-color: var(--secondary);
        }

        .exercise-item.active {
            background-color: var(--accent);
        }

        /* Main Content */
        #main-content {
            flex-grow: 1;
            padding: 40px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        h1 { color: var(--primary); margin-bottom: 15px; }
        h2 { color: var(--accent); margin-bottom: 10px; font-size: 1.3rem; }
        p { line-height: 1.6; margin-bottom: 15px; }

        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            transition: opacity 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary { background-color: var(--accent); color: white; }
        .btn-secondary { background-color: var(--secondary); color: white; }
        .btn-success { background-color: var(--success); color: white; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Resolution Styles */
        .step {
            border-left: 4px solid var(--accent);
            padding-left: 20px;
            margin-bottom: 20px;
        }

        .step-title {
            font-weight: bold;
            color: var(--secondary);
            margin-bottom: 5px;
        }

        /* Questionnaire */
        .quiz-option {
            display: block;
            padding: 10px;
            background: var(--light);
            margin-bottom: 10px;
            border-radius: 4px;
            cursor: pointer;
            border: 2px solid transparent;
        }

        .quiz-option:hover { background: #e2e6e7; }
        .quiz-option.correct { background: #d4edda; border-color: var(--success); }
        .quiz-option.wrong { background: #f8d7da; border-color: var(--danger); }

        /* Modal */
        #theory-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            width: 80%;
            max-width: 900px;
            max-height: 90vh;
            border-radius: 8px;
            padding: 40px;
            overflow-y: auto;
            position: relative;
        }

        .close-modal {
            position: absolute;
            top: 20px; right: 20px;
            font-size: 2rem;
            cursor: pointer;
            color: var(--dark);
        }

        .svg-container {
            text-align: center;
            margin: 20px 0;
            background: #fff;
            padding: 10px;
            border: 1px solid #eee;
        }

        /* Math Typography */
        .math { font-family: 'Times New Roman', Times, serif; font-style: italic; }
        sub, sup { font-size: 0.8em; }

        /* Navigation Buttons at bottom */
        .nav-controls {
            display: flex;
            justify-content: space-between;
            margin-top: auto;
            padding-top: 20px;
        }

        /* Periodic Table Styles */
        #periodic-table-view {
            display: none;
            flex-direction: column;
            align-items: center;
        }

        .periodic-grid {
            display: grid;
            grid-template-columns: repeat(18, 1fr);
            gap: 4px;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            overflow-x: auto;
            max-width: 100%;
        }

        .element {
            width: 45px;
            height: 55px;
            border: 1px solid #ccc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            cursor: default;
            border-radius: 2px;
            position: relative;
        }

        .element .symbol { font-weight: bold; font-size: 1rem; }
        .element .at-num { position: absolute; top: 2px; left: 2px; font-size: 0.6rem; }
        .element .at-mass { position: absolute; bottom: 2px; font-size: 0.55rem; width: 100%; text-align: center; }

        /* Element Colors based on type */
        .alkali-metal { background-color: #ff9999; }
        .alkaline-earth { background-color: #ffcc99; }
        .transition-metal { background-color: #ffff99; }
        .post-transition { background-color: #ccff99; }
        .metalloid { background-color: #99ffcc; }
        .reactive-nonmetal { background-color: #99ffff; }
        .noble-gas { background-color: #cc99ff; }
        .lanthanide { background-color: #ff99ff; }
        .actinide { background-color: #ffb3e6; }
        .unknown { background-color: #e2e2e2; }

        .pt-legend {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 20px;
            font-size: 0.8rem;
        }
        .legend-item { display: flex; align-items: center; gap: 5px; }
        .legend-box { width: 15px; height: 15px; border: 1px solid #999; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2>Menú</h2>
    <div class="colloquium-header" onclick="showPeriodicTable()" style="background: var(--success); color: white; margin-bottom: 15px; justify-content: center;">Tabla Periódica</div>
    
    <h2>Contenidos</h2>
    <div id="colloquium-container">
        <!-- Populated by JS -->
    </div>
</div>

<div id="main-content">
    <!-- Exercise View -->
    <div id="exercise-view" class="card">
        <h1 id="ex-title">Ejercicio 1</h1>
        <div id="ex-statement"></div>
        
        <div class="btn-group">
            <button class="btn btn-secondary" onclick="toggleResolution()">Ver Resolución</button>
            <button class="btn btn-primary" onclick="showTheory()">Ver Teoría</button>
        </div>

        <div id="ex-resolution" style="display: none; margin-top: 30px;">
            <hr style="margin-bottom: 20px; opacity: 0.2;">
            <h2>Resolución Paso a Paso</h2>
            <div id="res-steps"></div>
        </div>
    </div>

    <!-- Periodic Table View -->
    <div id="periodic-table-view" class="card">
        <h1>Tabla Periódica de los Elementos</h1>
        <div class="periodic-grid" id="pt-grid">
            <!-- Populated by JS -->
        </div>
        <div class="pt-legend">
            <div class="legend-item"><div class="legend-box alkali-metal"></div> Metales Alcalinos</div>
            <div class="legend-item"><div class="legend-box alkaline-earth"></div> Alcalinotérreos</div>
            <div class="legend-item"><div class="legend-box transition-metal"></div> Metales de Transición</div>
            <div class="legend-item"><div class="legend-box lanthanide"></div> Lantánidos</div>
            <div class="legend-item"><div class="legend-box actinide"></div> Actínidos</div>
            <div class="legend-item"><div class="legend-box post-transition"></div> Otros Metales</div>
            <div class="legend-item"><div class="legend-box metalloid"></div> Metaloides</div>
            <div class="legend-item"><div class="legend-box reactive-nonmetal"></div> No Metales</div>
            <div class="legend-item"><div class="legend-box noble-gas"></div> Gases Nobles</div>
        </div>
        <button class="btn btn-secondary" style="margin-top: 20px;" onclick="loadExercise(currentIndex)">Volver al Ejercicio</button>
    </div>

    <div id="quiz-view" class="card" style="display: none;">
        <h2>Cuestionario de Conceptos</h2>
        <div id="quiz-content"></div>
    </div>

    <div class="nav-controls" id="main-nav-controls">
        <button id="prev-btn" class="btn btn-secondary" onclick="changeExercise(-1)">Anterior</button>
        <button id="quiz-btn" class="btn btn-success" onclick="toggleQuiz()">Hacer Cuestionario</button>
        <button id="next-btn" class="btn btn-secondary" onclick="changeExercise(1)">Siguiente</button>
    </div>
</div>

<div id="theory-modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeTheory()">&times;</span>
        <div id="theory-content"></div>
    </div>
</div>

<script>
    // Scalable data structure for multiple colloquiums
    const colloquiums = [
        {
            id: 2,
            name: "Coloquio N° 2",
            exercises: [
                {
                    id: 1,
                    category: "Atoms",
                    title: "Ejercicio 1",
                    statement: `Un átomo de hierro presenta número másico <span class="math">A = 56</span> y número atómico <span class="math">Z = 26</span>.
                    <ul>
                        <li>Calcule la cantidad de protones (p<sup>+</sup>), neutrones (n<sup>0</sup>) y electrones (e<sup>-</sup>).</li>
                        <li>Identifique el elemento en la tabla periódica y escriba su símbolo completo <span class="math"><sup>A</sup><sub>Z</sub>X</span>.</li>
                    </ul>`,
                    steps: [
                        { t: "Identificar Datos", d: "Z (Número Atómico) = 26. A (Número Másico) = 56." },
                        { t: "Calcular Protones", d: "El número atómico Z es igual al número de protones. Por lo tanto, p<sup>+</sup> = 26." },
                        { t: "Calcular Electrones", d: "En un átomo neutro, el número de electrones es igual al número de protones. Por lo tanto, e<sup>-</sup> = 26." },
                        { t: "Calcular Neutrones", d: "A = Z + n<sup>0</sup>. Despejando: n<sup>0</sup> = A - Z = 56 - 26 = 30." },
                        { t: "Símbolo Completo", d: "El elemento con Z = 26 es el Hierro (Fe). El símbolo completo es <sup>56</sup><sub>26</sub>Fe." }
                    ],
                    quiz: {
                        question: "¿Qué representa el número másico (A) en un átomo?",
                        options: [
                            { text: "Solo el número de electrones.", correct: false },
                            { text: "La suma de protones y neutrones.", correct: true },
                            { text: "El número de niveles de energía.", correct: false }
                        ]
                    }
                },
                {
                    id: 2,
                    category: "Atoms",
                    title: "Ejercicio 2",
                    statement: `Un ion posee 20 protones, 18 electrones y 20 neutrones.
                    <ul>
                        <li>Escriba el símbolo completo del ion.</li>
                        <li>Determine su carga e indique si es catión o anión.</li>
                        <li>¿A qué elemento pertenece?</li>
                    </ul>`,
                    steps: [

                        { t: "Clasificar Ion", d: "Al tener carga positiva (+2), es un catión (ion dipositivo)." },
                        { t: "Calcular Número Másico", d: "A = p<sup>+</sup> + n<sup>0</sup> = 20 + 20 = 40." },
                        { t: "Símbolo del Ion", d: "El símbolo es <sup>40</sup><sub>20</sub>Ca<sup>2+</sup>." }
                    ],
                    quiz: {
                        question: "Si un átomo pierde electrones, se convierte en:",

                            { text: "Un anión con carga negativa.", correct: false },
                            { text: "Un catión con carga positiva.", correct: true },
                            { text: "Un isótopo neutro.", correct: false }
                        ]
                    }
                },
                {
                    id: 3,
                    category: "Mass",
                    title: "Ejercicio 3",
                    statement: `Usando la constante de Avogadro (<span class="math">N<sub>A</sub> = 6,02 × 10<sup>23</sup></span> átomos/mol) y la masa molar del carbono (<span class="math">M = 12 g/mol</span>), calcule la masa de un único átomo de carbono en gramos. Exprese el resultado en notación científica.`,
                    steps: [
                        { t: "Relación Fundamental", d: "1 mol de átomos de C tiene una masa de 12 g y contiene 6,02 × 10<sup>23</sup> átomos." },
                        { t: "Planteo Matemático", d: "Masa de 1 átomo = Masa Molar / N<sub>A</sub>" },
                        { t: "Cálculo", d: "Masa = 12 g/mol / (6,02 × 10<sup>23</sup> átomos/mol) ≈ 1,99 × 10<sup>-23</sup> g." }
                    ],
                    quiz: {
                        question: "¿Qué cantidad de sustancia contiene exactamente el número de Avogadro de partículas?",

                },
                {
                    id: 4,
                    category: "Atoms",
                    title: "Ejercicio 4",
                    statement: `Para el isótopo <span class="math"><sup>40</sup><sub>19</sub>K</span>: ¿cuántos neutrones posee? ¿Qué representa cada número en la notación isotópica?`,
                    steps: [
                        { t: "Identificar Números", d: "Número superior (A) = 40. Número inferior (Z) = 19." },
                        { t: "Significado", d: "40 es el número másico (protones + neutrones). 19 es el número atómico (protones)." },
                        { t: "Calcular Neutrones", d: "n<sup>0</sup> = A - Z = 40 - 19 = 21 neutrones." }
                    ],
                    quiz: {
                        question: "¿Qué tienen en común dos isótopos del mismo elemento?",

                            { text: "El mismo número atómico (Z).", correct: true }

                    }
                },
                {
                    id: 5,
                    category: "Atoms",
                    title: "Ejercicio 5",
                    statement: `Un átomo neutro contiene 15 electrones.

                {

                {

    let currentColloquiumIndex = 0;
    let currentExerciseIndex = 0;

    function init() {
        renderSidebar();
        loadExercise(0, 0);
    }

    function renderSidebar() {
        const container = document.getElementById('colloquium-container');
        container.innerHTML = '';
        
        colloquiums.forEach((col, cIdx) => {
            const group = document.createElement('div');
            group.className = 'colloquium-group';
            
            const header = document.createElement('div');
            header.className = 'colloquium-header';
            header.innerHTML = `<span>${col.name}</span> <span id="arrow-${cIdx}">▼</span>`;
            header.onclick = () => toggleColloquium(cIdx);
            
            const list = document.createElement('ul');
            list.className = 'exercise-list';
            list.id = `list-${cIdx}`;
            if (cIdx === currentColloquiumIndex) list.classList.add('expanded');
            
            col.exercises.forEach((ex, eIdx) => {
                const li = document.createElement('li');
                li.className = 'exercise-item';
                li.id = `item-${cIdx}-${eIdx}`;
                li.textContent = ex.title;
                li.onclick = (e) => {
                    e.stopPropagation();
                    loadExercise(cIdx, eIdx);
                };
                list.appendChild(li);
            });
            
            group.appendChild(header);
            group.appendChild(list);
            container.appendChild(group);
        });
    }

    function toggleColloquium(index) {
        const list = document.getElementById(`list-${index}`);
        const arrow = document.getElementById(`arrow-${index}`);
        const isExpanded = list.classList.contains('expanded');
        
        // Close others if you want only one open at a time (optional)
        // document.querySelectorAll('.exercise-list').forEach(l => l.classList.remove('expanded'));
        
        if (isExpanded) {
            list.classList.remove('expanded');
            arrow.textContent = '▼';
        } else {
            list.classList.add('expanded');
            arrow.textContent = '▲';
        }
    }

    function loadExercise(cIdx, eIdx) {
        currentColloquiumIndex = cIdx;
        currentExerciseIndex = eIdx;
        
        document.getElementById('periodic-table-view').style.display = 'none';
        document.getElementById('main-nav-controls').style.display = 'flex';
        document.getElementById('exercise-view').style.display = 'block';

        const col = colloquiums[cIdx];
        const ex = col.exercises[eIdx];
        
        // Update Sidebar Active state
        document.querySelectorAll('.exercise-item').forEach(item => item.classList.remove('active'));
        document.getElementById(`item-${cIdx}-${eIdx}`).classList.add('active');

        // Load Content
        document.getElementById('ex-title').textContent = `${col.name} - ${ex.title}`;
        document.getElementById('ex-statement').innerHTML = ex.statement;
        
        // Load Resolution
        const stepsContainer = document.getElementById('res-steps');
        stepsContainer.innerHTML = '';
        ex.steps.forEach(step => {
            const div = document.createElement('div');
            div.className = 'step';
            div.innerHTML = `<div class="step-title">${step.t}</div><p>${step.d}</p>`;
            stepsContainer.appendChild(div);
        });

        // UI Reset
        document.getElementById('ex-resolution').style.display = 'none';
        document.getElementById('quiz-view').style.display = 'none';
        document.getElementById('prev-btn').disabled = (cIdx === 0 && eIdx === 0);
        document.getElementById('next-btn').disabled = (cIdx === colloquiums.length - 1 && eIdx === col.exercises.length - 1);
        document.getElementById('quiz-btn').textContent = "Hacer Cuestionario";
        document.getElementById('main-content').scrollTop = 0;
    }

    function changeExercise(delta) {
        let newEIdx = currentExerciseIndex + delta;
        let newCIdx = currentColloquiumIndex;

        if (newEIdx < 0) {
            if (newCIdx > 0) {
                newCIdx--;
                newEIdx = colloquiums[newCIdx].exercises.length - 1;
            } else {
                return; // Boundary
            }
        } else if (newEIdx >= colloquiums[newCIdx].exercises.length) {
            if (newCIdx < colloquiums.length - 1) {
                newCIdx++;
                newEIdx = 0;
            } else {
                return; // Boundary
            }
        }
        loadExercise(newCIdx, newEIdx);
    }

    function toggleResolution() {
        const res = document.getElementById('ex-resolution');
        res.style.display = res.style.display === 'none' ? 'block' : 'none';
        if (res.style.display === 'block') res.scrollIntoView({ behavior: 'smooth' });
    }

    function toggleQuiz() {
        const qv = document.getElementById('quiz-view');
        if (qv.style.display === 'none') {
            const ex = colloquiums[currentColloquiumIndex].exercises[currentExerciseIndex];
            const content = document.getElementById('quiz-content');
            content.innerHTML = `
                <p><strong>${ex.quiz.question}</strong></p>
                ${ex.quiz.options.map(opt => `
                    <div class="quiz-option" onclick="checkAnswer(this, ${opt.correct})">${opt.text}</div>
                `).join('')}
            `;
            qv.style.display = 'block';
            document.getElementById('quiz-btn').textContent = "Ocultar Cuestionario";
            qv.scrollIntoView({ behavior: 'smooth' });
        } else {
            qv.style.display = 'none';
            document.getElementById('quiz-btn').textContent = "Hacer Cuestionario";
        }
    }

    function checkAnswer(el, isCorrect) {
        if (el.parentNode.querySelector('.correct') || el.parentNode.querySelector('.wrong')) return;
        el.className = 'quiz-option ' + (isCorrect ? 'correct' : 'wrong');
    }

    function showTheory() {
        const ex = colloquiums[currentColloquiumIndex].exercises[currentExerciseIndex];
        const theory = theoryData[ex.category];
        const content = document.getElementById('theory-content');
        content.innerHTML = `
            <h1>${theory.title}</h1>
            <div style="font-size: 1.1rem;">${theory.content}</div>
            <div class="svg-container">${theory.svg}</div>
            <button class="btn btn-primary" onclick="closeTheory()">Entendido</button>
        `;
        document.getElementById('theory-modal').style.display = 'flex';
    }

    function closeTheory() {
        document.getElementById('theory-modal').style.display = 'none';
    }

    window.onclick = function(event) {
        const modal = document.getElementById('theory-modal');
        if (event.target == modal) closeTheory();
    }

    function renderPeriodicTable() {

            div.style.gridColumn = el.col;
            div.style.gridRow = el.row;
            div.innerHTML = `
                <div class="at-num">${el.number}</div>
                <div class="symbol">${el.symbol}</div>
                <div class="at-mass">${el.mass}</div>
            `;
            grid.appendChild(div);

    }

    function showPeriodicTable() {
